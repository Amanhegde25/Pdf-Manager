<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge PDF — PDF Tools</title>
    <meta name="description" content="Upload PDFs and Word documents, reorder them, and merge into one PDF.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <a href="/" class="back-link">&larr; All Tools</a>
            <h1>Merge PDF</h1>
            <p>Upload, reorder, and merge your documents</p>
        </header>

        <!-- Drop Zone -->
        <div class="dropzone" id="dropzone">
            <div class="dropzone-icon">📁</div>
            <h3>Drop your files here</h3>
            <p>Supports PDF, Word (.docx), JPG, and PNG files</p>
            <button class="browse-btn" id="browseBtn" type="button">Browse Files</button>
            <input type="file" id="fileInput" multiple accept=".pdf,.docx,.doc,.jpg,.jpeg,.png">
        </div>

        <!-- File List -->
        <section class="file-list-section" id="fileListSection">
            <div class="file-list-header">
                <h2>Your Files</h2>
                <div class="file-list-actions">
                    <button class="clear-all-btn" id="clearAllBtn" type="button">Clear All</button>
                    <span class="file-count" id="fileCount">0 files</span>
                </div>
            </div>
            <div class="file-list" id="fileList"></div>
        </section>

        <!-- Merge Button -->
        <div class="merge-section" id="mergeSection" style="display:none;">
            <button class="merge-btn" id="mergeBtn" disabled>
                <span>🔗</span> Merge PDF
            </button>
        </div>

        <!-- Result -->
        <div class="result-card" id="resultCard" style="display:none;">
            <div class="result-info">
                <span class="result-icon">✅</span>
                <span id="resultText">PDF merged successfully!</span>
            </div>
            <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
                <button class="preview-action-btn" id="previewMergedBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                    Preview
                </button>
                <button class="adjust-settings-btn" id="adjustBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9" />
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                    </svg>
                    Adjust Files
                </button>
                <button class="merge-btn" id="downloadMergedBtn" style="padding:14px 32px;">
                    <span>⬇</span> Download
                </button>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>PDF Tools — Merge your documents into one</p>
        </footer>
    </div>

    <!-- Preview Modal -->
    <div class="preview-modal" id="previewModal">
        <div class="preview-container">
            <div class="preview-header">
                <h3 id="previewTitle">Preview</h3>
                <div class="preview-actions">
                    <button class="preview-close-btn" id="previewCloseBtn" type="button">✕</button>
                </div>
            </div>
            <div class="preview-body">
                <iframe id="previewFrame" src="" frameborder="0"></iframe>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Processing...</div>
    </div>

    <!-- SortableJS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
